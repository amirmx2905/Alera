apiVersion: apps/v1
kind: Deployment
metadata:
  name: alera-web
  namespace: alera
  labels:
    app: alera-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: alera-web
  template:
    metadata:
      labels:
        app: alera-web
    spec:
      containers:
        - name: alera-web
          image: alera-web:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
